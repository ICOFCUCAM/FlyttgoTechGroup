<?xml version="1.0" encoding="UTF-8"?>
<!--
  FlyttGo infrastructure symbol — monochrome variant (§7).
  Uses currentColor so the host surface controls the ink.
  Echo opacity raised to 0.60 to compensate for missing gradient depth.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     role="img" aria-label="FlyttGo">
  <g stroke="currentColor" stroke-width="2" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 4 18 L 10 12 L 14 16 L 20 10" opacity="0.60"/>
    <path d="M 4 12 L 10  6 L 14 10 L 20  4"/>
  </g>
</svg>
