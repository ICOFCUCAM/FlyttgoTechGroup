<?xml version="1.0" encoding="UTF-8"?>
<!--
  FlyttGo infrastructure symbol — canonical 24x24 F-mark.
  Single closed path, solid fill, hard right-angle corners.
  Consumes CSS variables for module-color inheritance (section 9 of
  the master spec); falls back to the platform blue gradient.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     role="img" aria-label="FlyttGo">
  <defs>
    <linearGradient id="flytt-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="var(--mark-stop-a, #0A3A6B)"/>
      <stop offset="100%" stop-color="var(--mark-stop-b, #1E6FD9)"/>
    </linearGradient>
  </defs>
  <path d="M 4 2 H 22 V 7 H 9 V 10 H 18 V 15 H 9 V 22 H 4 Z"
        fill="url(#flytt-grad)"/>
</svg>
