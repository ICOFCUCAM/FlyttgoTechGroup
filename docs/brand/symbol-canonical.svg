<?xml version="1.0" encoding="UTF-8"?>
<!--
  FlyttGo infrastructure symbol — canonical 24x24 mark.
  Uses CSS custom properties for module-color inheritance (section 9).
  Falls back to the platform gradient if the host does not declare
  the mark-stop CSS variables.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     role="img" aria-label="FlyttGo">
  <defs>
    <linearGradient id="flytt-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="var(--mark-stop-a, #0A3A6B)"/>
      <stop offset="100%" stop-color="var(--mark-stop-b, #1E6FD9)"/>
    </linearGradient>
  </defs>
  <g stroke="url(#flytt-grad)" stroke-width="2" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 4 18 L 10 12 L 14 16 L 20 10" opacity="0.55"/>
    <path d="M 4 12 L 10  6 L 14 10 L 20  4"/>
  </g>
</svg>
