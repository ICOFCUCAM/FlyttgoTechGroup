<?xml version="1.0" encoding="UTF-8"?>
<!--
  Transify module variant — mobility blue.
  Same gradient pair as canonical FlyttGo platform mark; Transify is
  the mobility primary so it shares the platform identity.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     role="img" aria-label="Transify">
  <defs>
    <linearGradient id="m-transify" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0A3A6B"/>
      <stop offset="100%" stop-color="#1E6FD9"/>
    </linearGradient>
  </defs>
  <path d="M 4 2 H 22 V 7 H 9 V 10 H 18 V 15 H 9 V 22 H 4 Z"
        fill="url(#m-transify)"/>
</svg>
