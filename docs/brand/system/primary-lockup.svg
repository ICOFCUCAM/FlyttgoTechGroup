<?xml version="1.0" encoding="UTF-8"?>
<!--
  Primary horizontal lockup — F-symbol + FlyttGo wordmark.
  ViewBox: 0 0 152 24 (24-tall mark + 8-px gap + ~120-px wordmark).
  Wordmark uses Inter (the site sans). For print or print-export,
  outline the text in your design tool before delivery.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 24"
     role="img" aria-label="FlyttGo Technologies Group">
  <defs>
    <linearGradient id="flytt-grad" x1="0" y1="0" x2="1" y2="1"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="var(--mark-stop-a, #0A3A6B)"/>
      <stop offset="100%" stop-color="var(--mark-stop-b, #1E6FD9)"/>
    </linearGradient>
  </defs>

  <!-- F-symbol -->
  <path d="M 4 2 H 22 V 7 H 9 V 10 H 18 V 15 H 9 V 22 H 4 Z"
        fill="url(#flytt-grad)"/>

  <!-- Wordmark -->
  <text x="32" y="17"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14"
        font-weight="600"
        letter-spacing="-0.3"
        fill="#0A1F3D">FlyttGo</text>
  <text x="84.5" y="17"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="-0.2"
        fill="#475569">Technologies</text>
</svg>
