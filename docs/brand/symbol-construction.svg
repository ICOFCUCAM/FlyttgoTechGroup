<?xml version="1.0" encoding="UTF-8"?>
<!--
  FlyttGo infrastructure symbol — construction reference.
  Shows the 24×24 px canvas, 4×4 major grid, 1×1 sub-grid,
  the canonical mark and its echo, and the safe-area band.
  Open in any SVG viewer; do NOT ship this file as the mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="384" height="384"
     shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="flytt-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0A3A6B"/>
      <stop offset="100%" stop-color="#1E6FD9"/>
    </linearGradient>
    <pattern id="subgrid" x="0" y="0" width="1" height="1" patternUnits="userSpaceOnUse">
      <path d="M 1 0 L 0 0 0 1" fill="none" stroke="#E2E8F0" stroke-width="0.04"/>
    </pattern>
    <pattern id="majorgrid" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#94A3B8" stroke-width="0.08"/>
    </pattern>
  </defs>

  <!-- Canvas background -->
  <rect x="0" y="0" width="24" height="24" fill="#FBFCFE"/>

  <!-- Sub-grid (1px) -->
  <rect x="0" y="0" width="24" height="24" fill="url(#subgrid)"/>
  <!-- Major grid (4px) -->
  <rect x="0" y="0" width="24" height="24" fill="url(#majorgrid)"/>

  <!-- Safe-area band (S = 0.25 × mark height = 6px around the mark glyph,
       which itself spans x∈[4,20], y∈[4,18]). Show as dashed inset. -->
  <rect x="4" y="4" width="16" height="14" fill="none"
        stroke="#94A3B8" stroke-width="0.08" stroke-dasharray="0.4 0.3"/>

  <!-- Echo stroke (lower) — drawn first so it sits behind upper -->
  <path d="M 4 18 L 10 12 L 14 16 L 20 10"
        fill="none"
        stroke="url(#flytt-grad)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.55"/>

  <!-- Upper stroke (foreground) -->
  <path d="M 4 12 L 10  6 L 14 10 L 20  4"
        fill="none"
        stroke="url(#flytt-grad)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Control points — visible for construction reference -->
  <g fill="#0A3A6B">
    <circle cx="4"  cy="12" r="0.18"/>
    <circle cx="10" cy="6"  r="0.18"/>
    <circle cx="14" cy="10" r="0.18"/>
    <circle cx="20" cy="4"  r="0.18"/>
    <circle cx="4"  cy="18" r="0.18" opacity="0.55"/>
    <circle cx="10" cy="12" r="0.18" opacity="0.55"/>
    <circle cx="14" cy="16" r="0.18" opacity="0.55"/>
    <circle cx="20" cy="10" r="0.18" opacity="0.55"/>
  </g>
</svg>
