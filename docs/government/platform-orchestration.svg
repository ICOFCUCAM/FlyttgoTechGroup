<?xml version="1.0" encoding="UTF-8"?>
<!--
  FlyttGoTech Core orchestration diagram.

  Four horizontal bands top-to-bottom:
    1. Service-delivery surface  - eight platform modules
    2. FlyttGoTech Core          - orchestration substrate
    3. Deployment substrate      - three deployment modes
    4. Sovereignty band          - data residency / key custody / audit posture

  Renders the SaaS / PaaS / IaaS / Sovereign positioning explicitly
  so a regulator or procurement officer can read the architecture
  in one glance. Suitable for the Government Capability Brief
  (page 2) and the /government landing page sovereignty section.
-->
